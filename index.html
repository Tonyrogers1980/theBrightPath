<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeSchool AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --g:#16a974;--gl:#e8f8f1;--gd:#0d7a54;--gm:#7dd5b0;
  --am:#c47f0a;--al:#fef3dc;
  --rd:#b53030;--rl:#fdeaea;
  --bg:#f6f5f0;--s0:#ffffff;--s1:#f0efe9;--s2:#e8e7e0;
  --b0:rgba(0,0,0,.07);--b1:rgba(0,0,0,.13);--b2:rgba(0,0,0,.22);
  --t0:#111110;--t1:#5a5a54;--t2:#9a9992;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--rpill:999px;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.07);
  --shadow-sm:0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0e0e0d;--s0:#1a1a18;--s1:#242422;--s2:#2e2e2c;
    --b0:rgba(255,255,255,.06);--b1:rgba(255,255,255,.11);--b2:rgba(255,255,255,.18);
    --t0:#f2f2ec;--t1:#9a9992;--t2:#666660;
    --gl:#0a2e1e;--al:#2e1f04;--rl:#2a1212;
    --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.3);
    --shadow-sm:0 1px 2px rgba(0,0,0,.2),0 2px 8px rgba(0,0,0,.2);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--t0);font-size:15px;line-height:1.55;min-height:100vh}
input,textarea,button{font-family:var(--font)}

/* ────────────────────────────────────────────
   AUTH
──────────────────────────────────────────── */
.auth-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;background:var(--bg)}
.auth-brand{text-align:center;margin-bottom:2.5rem}
.auth-brand .wordmark{font-size:30px;font-weight:700;letter-spacing:-0.7px;color:var(--t0)}
.auth-brand .wordmark em{font-style:normal;color:var(--g)}
.auth-brand p{font-size:14px;color:var(--t1);margin-top:5px}
.auth-box{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r20);padding:2rem;width:100%;max-width:420px;box-shadow:var(--shadow)}
.tab-row{display:flex;background:var(--s1);border-radius:var(--r8);padding:3px;margin-bottom:1.75rem;gap:3px}
.tab-pill{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:600;color:var(--t1);cursor:pointer;border-radius:6px;transition:all .18s}
.tab-pill.on{background:var(--s0);color:var(--t0);box-shadow:var(--shadow-sm)}
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--t1);text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;padding:10px 13px;border:1px solid var(--b1);border-radius:var(--r8);background:var(--s0);color:var(--t0);font-size:14px;transition:border-color .15s,box-shadow .15s}
.field input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(22,169,116,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid transparent;font-family:var(--font);white-space:nowrap}
.btn-green{background:var(--g);color:#fff;border-color:var(--g);width:100%}
.btn-green:hover:not(:disabled){background:var(--gd)}
.btn-green:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--t1);border-color:var(--b1)}
.btn-ghost:hover{background:var(--s1);color:var(--t0)}
.btn-sm{padding:6px 13px;font-size:13px}
.btn-danger{background:transparent;color:var(--rd);border-color:var(--rl)}
.btn-danger:hover{background:var(--rl)}
.msg{padding:10px 13px;border-radius:var(--r8);font-size:13px;margin-bottom:1.1rem;font-weight:500}
.msg-err{background:var(--rl);color:var(--rd)}
.msg-ok{background:var(--gl);color:var(--gd)}
.auth-footer{text-align:center;margin-top:1.25rem;font-size:13px;color:var(--t1)}
.auth-footer a{color:var(--g);cursor:pointer;font-weight:600;text-decoration:none}
.offline-note{margin-top:1rem;font-size:12px;color:var(--t2);text-align:center;display:flex;align-items:center;justify-content:center;gap:5px}
.offline-dot{width:6px;height:6px;border-radius:50%;background:var(--gm)}

/* ────────────────────────────────────────────
   SHELL
──────────────────────────────────────────── */
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--s0);border-bottom:1px solid var(--b0);height:58px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-logo{font-size:17px;font-weight:700;letter-spacing:-0.3px;color:var(--t0)}
.topbar-logo em{font-style:normal;color:var(--g)}
.topbar-right{display:flex;align-items:center;gap:8px}
.child-chip{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 6px;border:1px solid var(--b0);border-radius:var(--rpill);background:var(--s1);cursor:pointer;transition:all .15s;font-size:13px;color:var(--t1);font-weight:500}
.child-chip:hover{border-color:var(--b1);background:var(--s2)}
.av{width:28px;height:28px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gd);flex-shrink:0;letter-spacing:.03em}
.main-area{flex:1;max-width:800px;margin:0 auto;width:100%;padding:1.75rem 1.25rem 2rem}
.page-title{font-size:20px;font-weight:700;letter-spacing:-0.3px;margin-bottom:1.5rem}

/* ────────────────────────────────────────────
   BOTTOM NAV
──────────────────────────────────────────── */
.bnav{background:var(--s0);border-top:1px solid var(--b0);display:flex;position:sticky;bottom:0;z-index:50}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px 7px;cursor:pointer;color:var(--t2);font-size:10px;font-weight:600;gap:3px;transition:color .15s;border:none;background:none;letter-spacing:.03em}
.nitem.on{color:var(--g)}
.nitem svg{width:22px;height:22px;stroke:currentColor}

/* ────────────────────────────────────────────
   ONBOARDING
──────────────────────────────────────────── */
.ob-wrap{max-width:480px;margin:2rem auto 0}
.ob-card{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r20);padding:2rem;box-shadow:var(--shadow)}
.ob-card h2{font-size:20px;font-weight:700;margin-bottom:6px;letter-spacing:-0.3px}
.ob-card .sub{font-size:14px;color:var(--t1);margin-bottom:1.5rem;line-height:1.6}
.age-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:1rem}
@media(max-width:440px){.age-grid{grid-template-columns:repeat(4,1fr)}}
.age-btn{padding:11px 4px;border:1.5px solid var(--b0);border-radius:var(--r8);background:var(--s0);font-size:13px;font-weight:600;color:var(--t1);cursor:pointer;text-align:center;transition:all .15s;line-height:1.2}
.age-btn:hover{border-color:var(--g);color:var(--g)}
.age-btn.sel{border-color:var(--g);background:var(--gl);color:var(--gd)}
.age-btn small{display:block;font-size:9px;margin-top:3px;font-weight:500;opacity:.8}
.ks-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--gd);background:var(--gl);border-radius:var(--rpill);padding:4px 10px;margin-bottom:1rem}

/* ────────────────────────────────────────────
   DASHBOARD
──────────────────────────────────────────── */
.dash-greeting{margin-bottom:1.5rem}
.dash-greeting h2{font-size:22px;font-weight:700;letter-spacing:-0.4px}
.dash-greeting p{font-size:14px;color:var(--t1);margin-top:3px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:500px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-tile{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r12);padding:14px 16px;box-shadow:var(--shadow-sm)}
.stat-tile .n{font-size:24px;font-weight:700;letter-spacing:-0.5px;color:var(--t0)}
.stat-tile .l{font-size:11px;font-weight:600;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.streak-bar{display:flex;align-items:center;gap:5px;margin-bottom:1.5rem}
.sdot{width:12px;height:12px;border-radius:3px;background:var(--s2)}
.sdot.on{background:var(--g)}
.streak-lbl{font-size:12px;font-weight:500;color:var(--t2);margin-left:5px}
.subj-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:10px}
.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-bottom:1.5rem}
.subj-card{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r16);padding:1.1rem 1rem 1rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.subj-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.1);border-color:var(--b1)}
.subj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.subj-card.maths::before{background:#378ADD}
.subj-card.english::before{background:#D4537E}
.subj-card.science::before{background:#16a974}
.subj-card.history::before{background:#c47f0a}
.subj-card.geography::before{background:#6B5AE0}
.subj-card .s-ico{font-size:26px;margin-bottom:8px;display:block}
.subj-card .s-name{font-size:14px;font-weight:700;letter-spacing:-0.2px}
.subj-card .s-prg{font-size:12px;color:var(--t1);margin-top:3px;font-weight:500}
.done-check{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}

/* ────────────────────────────────────────────
   LESSON
──────────────────────────────────────────── */
.lesson-nav{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r8);font-size:13px;font-weight:600;color:var(--t1);cursor:pointer;background:var(--s0);border:1px solid var(--b0);transition:all .15s}
.back-btn:hover{background:var(--s1);color:var(--t0)}
.lesson-meta h2{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.lesson-meta p{font-size:12px;color:var(--t2);margin-top:2px;font-weight:500}
.part-pills{display:flex;gap:8px;margin-bottom:1.25rem}
.ppill{flex:1;padding:9px 12px;border:1.5px solid var(--b0);border-radius:var(--r8);background:var(--s0);font-size:13px;font-weight:600;color:var(--t1);cursor:pointer;text-align:center;transition:all .15s}
.ppill:hover:not(:disabled){border-color:var(--b1)}
.ppill.on{border-color:var(--g);color:var(--gd);background:var(--gl)}
.ppill.done{border-color:var(--gm);color:var(--gd)}
.ppill:disabled{opacity:.4;cursor:not-allowed}
.lcard{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r16);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow-sm)}
.lcard h3{font-size:17px;font-weight:700;letter-spacing:-0.3px;margin-bottom:12px}
.lbody{font-size:14px;line-height:1.85;color:var(--t1);white-space:pre-wrap;margin-bottom:1.25rem}
.yt-banner{display:flex;align-items:center;gap:12px;padding:12px 15px;background:var(--s1);border:1px solid var(--b0);border-radius:var(--r12);margin-bottom:1.25rem;text-decoration:none;color:var(--t0);transition:all .15s}
.yt-banner:hover{border-color:#ff4444;background:rgba(255,68,68,.04)}
.yt-logo{width:40px;height:40px;border-radius:8px;background:#FF0000;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yt-logo svg{width:20px;height:20px;fill:#fff}
.yt-info .yt-hint{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.yt-info .yt-q{font-size:13px;font-weight:600;margin-top:2px}
.q-list{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.25rem}
.q-item label{display:block;font-size:13px;font-weight:600;color:var(--t0);margin-bottom:7px}
.q-item textarea{width:100%;min-height:76px;padding:10px 12px;border:1.5px solid var(--b1);border-radius:var(--r8);background:var(--s0);color:var(--t0);font-size:13px;resize:vertical;line-height:1.6;transition:border-color .15s,box-shadow .15s}
.q-item textarea:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(22,169,116,.1)}
.q-item .ans-box{padding:9px 12px;background:var(--s1);border:1px solid var(--b0);border-radius:var(--r8);font-size:13px;color:var(--t1);line-height:1.6;min-height:36px;white-space:pre-wrap}
.submit-row{display:flex;justify-content:flex-end;padding-top:.25rem}
.btn-submit{background:var(--g);color:#fff;border-color:var(--g);padding:11px 28px;font-size:14px;border-radius:var(--r8)}
.btn-submit:hover{background:var(--gd)}
.spin-state{display:flex;align-items:center;gap:12px;padding:1.5rem 0;font-size:14px;color:var(--t1);font-weight:500}
.spin{width:20px;height:20px;border:2.5px solid var(--b1);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.done-banner{background:var(--gl);border:1px solid var(--gm);border-radius:var(--r12);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;font-size:14px;font-weight:600;color:var(--gd)}
.score-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:var(--rpill);font-size:12px;font-weight:700}
.sc-hi{background:var(--gl);color:var(--gd)}
.sc-mi{background:var(--al);color:var(--am)}
.sc-lo{background:var(--rl);color:var(--rd)}
.fb-card{background:var(--s1);border-radius:var(--r12);padding:1.25rem;font-size:14px;line-height:1.85;color:var(--t1);white-space:pre-wrap}
.fb-head{font-size:14px;font-weight:700;color:var(--t0);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.q-item.marked{border:1px solid var(--b0);border-radius:var(--r12);padding:.85rem 1rem;background:var(--s0);box-shadow:var(--shadow-sm);}
.q-num{font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;padding-top:2px;min-width:20px;}
.q-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.q-row label{flex:1;font-size:14px;font-weight:600;color:var(--t0);line-height:1.4;}
.q-mark{font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--rpill);white-space:nowrap;flex-shrink:0;}
.q-mark-yes{background:#e1f5ee;color:#0f6e56;}
.q-mark-no{background:#fce8e8;color:#b91c1c;}
.ans-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);margin-bottom:3px;}
.q-comment{font-size:13px;color:var(--t0);background:var(--gl);border-radius:var(--r8);padding:8px 10px;margin-top:4px;line-height:1.5;border-left:3px solid var(--g);}
.comment-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gd);margin-bottom:3px;}
.fb-overall{font-size:14px;color:var(--t1);line-height:1.7;padding:.5rem 0 .25rem;}
.retry-card{display:flex;flex-direction:column;align-items:center;gap:12px;padding:2rem;text-align:center}
.retry-card p{font-size:14px;color:var(--t1)}

/* ────────────────────────────────────────────
   HISTORY
──────────────────────────────────────────── */
.hist-group{margin-bottom:1.5rem}
.hist-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:8px}
.hist-list{list-style:none;background:var(--s0);border:1px solid var(--b0);border-radius:var(--r16);overflow:hidden;box-shadow:var(--shadow-sm)}
.hist-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--b0);cursor:pointer;transition:background .15s}
.hist-item:last-child{border-bottom:none}
.hist-item:hover{background:var(--s1)}
.hist-item:hover .hi-title{color:var(--g)}
.hi-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hi-info{flex:1}
.hi-title{font-size:13px;font-weight:600;transition:color .15s}
.hi-meta{font-size:12px;color:var(--t2);margin-top:1px}
.empty-state{text-align:center;padding:3.5rem 1rem;color:var(--t1)}
.empty-state .e-ico{font-size:44px;margin-bottom:12px}
.empty-state h3{font-size:16px;font-weight:700;margin-bottom:6px}
.empty-state p{font-size:14px;color:var(--t2)}

/* ────────────────────────────────────────────
   SETTINGS
──────────────────────────────────────────── */
.set-section{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r16);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow-sm)}
.set-section h3{font-size:15px;font-weight:700;margin-bottom:1rem;letter-spacing:-0.2px}
.child-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--b0)}
.child-row:last-of-type{border-bottom:none}
.acct-email{font-size:14px;color:var(--t1);margin-bottom:1rem;padding:8px 0;border-bottom:1px solid var(--b0)}

/* ────────────────────────────────────────────
   MODAL
──────────────────────────────────────────── */
.modal-veil{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:480px){.modal-veil{align-items:center;padding:1rem}}
.modal-box{background:var(--s0);border-radius:var(--r20) var(--r20) 0 0;padding:1.5rem;width:100%;max-width:400px}
@media(min-width:480px){.modal-box{border-radius:var(--r20)}}
.modal-box h3{font-size:16px;font-weight:700;margin-bottom:1rem;letter-spacing:-0.2px}
.modal-list{list-style:none;margin-bottom:1rem}
.modal-list li{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r8);cursor:pointer;transition:background .15s}
.modal-list li:hover{background:var(--s1)}
.modal-list li.on{background:var(--gl)}

/* ────────────────────────────────────────────
   UTILS
──────────────────────────────────────────── */
.divider{height:1px;background:var(--b0);margin:1rem 0}

/* XP/GAMIFICATION */
@keyframes xp-pop{0%{transform:scale(.6) translateY(0);opacity:0}60%{transform:scale(1.15) translateY(-18px);opacity:1}100%{transform:scale(1) translateY(-32px);opacity:0}}
@keyframes badge-in{0%{transform:scale(0) rotate(-15deg);opacity:0}70%{transform:scale(1.15) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes lvl-glow{0%,100%{box-shadow:0 0 0 0 rgba(22,169,116,.4)}50%{box-shadow:0 0 0 12px rgba(22,169,116,0)}}
@keyframes slide-up{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(60px) rotate(360deg);opacity:0}}
.xp-float{position:fixed;pointer-events:none;font-size:15px;font-weight:700;color:var(--g);z-index:999;animation:xp-pop .9s ease-out forwards}
.rank-bar-wrap{background:var(--s1);border-radius:var(--rpill);height:8px;overflow:hidden;margin:4px 0}
.rank-bar-fill{height:100%;border-radius:var(--rpill);background:linear-gradient(90deg,var(--g),#4adba2);transition:width .6s cubic-bezier(.4,0,.2,1)}
.rank-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:var(--rpill);letter-spacing:.02em}
.xp-card{background:var(--s0);border:1px solid var(--b0);border-radius:var(--r16);padding:1.1rem 1.25rem;margin-bottom:1rem;box-shadow:var(--shadow-sm)}
.xp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.xp-name{font-size:13px;font-weight:700;color:var(--t0)}
.xp-pts{font-size:13px;font-weight:600;color:var(--g)}
.xp-next{font-size:11px;color:var(--t2);margin-top:4px}

/* ── ROBUST JSON EXTRACTOR ──────────────────────────────────────────────────── */
/* Handles: fenced blocks, truncated output, curly-quote contamination,
   newlines inside string values, unescaped apostrophes in text fields */
function extractJSON(raw) {
  if (!raw) throw new Error('Empty response');

  // 1. Strip markdown fences
  var s = raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```\s*$/,'').trim();

  // 2. Find outermost { ... }
  var start = s.indexOf('{');
  var end   = s.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('No JSON object found');
  s = s.slice(start, end + 1);

  // 3. Try plain parse first
  try { return JSON.parse(s); } catch(e1) {}

  // 4. Sanitise common AI output quirks then retry
  var fixed = s
    // replace curly quotes
    .replace(/[\u201C\u201D]/g, '"')
    .replace(/[\u2018\u2019]/g, "'")
    // strip literal newlines inside string values (replace with \n)
    .replace(/"((?:[^"\\]|\\.)*)"/g, function(match) {
      return match.replace(/\n/g, '\\n').replace(/\r/g, '');
    });

  try { return JSON.parse(fixed); } catch(e2) {}

  // 5. Key-by-key extraction as last resort
  var result = {};
  var titleM    = raw.match(/"title"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  var contentM  = raw.match(/"content"\s*:\s*"([\s\S]*?)(?=",\s*"(?:questions|youtube)|"\s*\})/);
  var ytM       = raw.match(/"youtube_query"\s*:\s*"((?:[^"\\]|\\.)*)"/);
  var scoreM    = raw.match(/"score"\s*:\s*(\d+)/);
  var maxM      = raw.match(/"max_score"\s*:\s*(\d+)/);
  var feedbackM = raw.match(/"feedback"\s*:\s*"([\s\S]*?)(?="\s*\}|",\s*")/);

  if (titleM)    result.title    = titleM[1];
  if (contentM)  result.content  = contentM[1].replace(/\\n/g,'\n');
  if (ytM)       result.youtube_query = ytM[1];
  if (scoreM)    result.score    = parseInt(scoreM[1], 10);
  if (maxM)      result.max_score= parseInt(maxM[1], 10);
  if (feedbackM) result.feedback = feedbackM[1].replace(/\\n/g,'\n');

  // Extract questions array
  var qBlock = raw.match(/"questions"\s*:\s*\[([\s\S]*?)\]/);
  if (qBlock) {
    var qs = [];
    var qRe = /"((?:[^"\\]|\\.)*)"/g, m;
    while ((m = qRe.exec(qBlock[1])) !== null) qs.push(m[1]);
    result.questions = qs;
  }

  if (Object.keys(result).length === 0) throw new Error('Could not extract JSON fields');
  return result;
}

/* ── SUPABASE HELPERS ───────────────────────────────────────────────────────── */
function sbH(tok) {
  var auth = (!tok||tok.startsWith('db_')||tok.startsWith('local_')) ? SBKEY : tok;
  return { 'Content-Type':'application/json', 'apikey':SBKEY, 'Authorization':'Bearer '+auth };
}
async function sbReq(url, opts) {
  var r = await fetch(url, opts);
  if (!r.ok) { var e=await r.json().catch(function(){return{};}); throw new Error(e.error_description||e.message||'Request failed ('+r.status+')'); }
  return r;
}
async function sbAuth(path, body) {
  var res = await fetch(SB+'/auth/v1'+path, { method:'POST', headers:{'Content-Type':'application/json','apikey':SBKEY}, body:JSON.stringify(body) });
  var d = await res.json();
  console.log('[sbAuth]', path, res.status, JSON.stringify(d).slice(0,300));
  if (!res.ok) {
    var msg = d.error_description || d.msg || d.message || d.error || 'Auth failed ('+res.status+')';
    // Supabase returns this when SMTP not configured but signup otherwise fine
    // In that case the user IS created — try to continue
    if (res.status === 500 && msg.toLowerCase().indexOf('email') !== -1) return d;
    throw new Error(msg);
  }
  return d;
}
async function sbGet(tbl, q, tok) {
  var qs=Object.entries(q).map(function(e){return e[0]+'='+encodeURIComponent(e[1]);}).join('&');
  var r=await sbReq(SB+'/rest/v1/'+tbl+(qs?'?'+qs:''),{headers:sbH(tok)});
  return r.json();
}
async function sbPost(tbl, body, tok) {
  var r=await sbReq(SB+'/rest/v1/'+tbl,{method:'POST',headers:Object.assign({},sbH(tok),{'Prefer':'return=representation'}),body:JSON.stringify(body)});
  var d=await r.json(); return Array.isArray(d)?d[0]:d;
}

function isNetworkErr(e) { return e && (e.message||'').match(/fetch|network|failed to fetch|load failed/i); }
function sbLog(label, e) { console.warn('[Supabase '+label+']', e && (e.message||e)); }

async function rpc(fn, params) {
  var res = await fetch(SB+'/rest/v1/rpc/'+fn, {
    method: 'POST',
    headers: {'Content-Type':'application/json','apikey':SBKEY,'Authorization':'Bearer '+SBKEY},
    body: JSON.stringify(params)
  });
  var d = await res.json();
  console.log('[rpc]', fn, res.status, JSON.stringify(d).slice(0,200));
  if (!res.ok) throw new Error((d&&d.message)||('RPC '+fn+' failed ('+res.status+')'));
  return d;
}


/* ── UNIFIED API ────────────────────────────────────────────────────────────── */
async function apiLogin(email, pw) {
  try {
    // First verify credentials via DB function
    var res = await fetch(SB+'/rest/v1/rpc/login_user', {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':SBKEY,'Authorization':'Bearer '+SBKEY},
      body: JSON.stringify({p_email:email, p_password:pw})
    });
    var d = await res.json();
    console.log('[apiLogin rpc]', res.status, JSON.stringify(d).slice(0,200));
    if (d.error) throw new Error(d.error);
    if (!res.ok) throw new Error('Login failed ('+res.status+')');
    // Now get a real Supabase session token
    var tr = await fetch(SB+'/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':SBKEY},
      body: JSON.stringify({email:email, password:pw})
    });
    var td = await tr.json();
    console.log('[apiLogin token]', tr.status, JSON.stringify(td).slice(0,200));
    var tok = td.access_token || (td.session && td.session.access_token);
    if (!tok) {
      // Auth endpoint blocked — use DB-only mode with user ID as token
      DB_MODE = 'live';
      var dbUser = {id:d.user_id, email:d.email, user_metadata:{full_name:d.full_name}};
      console.log('[apiLogin] db_ mode user:', JSON.stringify(dbUser));
      return {user:dbUser, token:'db_'+d.user_id};
    }
    DB_MODE = 'live';
    return {user:td.user||(td.session&&td.session.user)||{id:d.user_id,email:d.email}, token:tok};
  } catch(e) {
    if (isNetworkErr(e)) return {user:LDB.login(email,pw), token:'local_'+LDB.login(email,pw).id};
    throw e;
  }
}
async function apiSignup(email, pw, name) {
  try {
    // Use DB function to bypass Supabase Auth signup restrictions
    var res = await fetch(SB+'/rest/v1/rpc/create_user', {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':SBKEY,'Authorization':'Bearer '+SBKEY},
      body: JSON.stringify({p_email:email, p_password:pw, p_name:name})
    });
    var d = await res.json();
    console.log('[apiSignup]', res.status, JSON.stringify(d).slice(0,200));
    if (d.error) throw new Error(d.error);
    if (!res.ok) throw new Error('Signup failed ('+res.status+')');
    DB_MODE = 'live';
    // Now log in to get a session token
    return await apiLogin(email, pw);
  } catch(e) {
    console.error('[apiSignup] error:', e.message);
    if (isNetworkErr(e)) { var u=LDB.signup(email,pw,name); return {user:u,token:'local_'+u.id}; }
    throw e;
  }
}

function pickEnglishType(ks, childId, lessonCount) {
  var rb=window._activeChildReadBooks||[];
  var useBook=rb.length>0&&(lessonCount%5<2); // ~40% book lessons when books available
  if(useBook){
    var seed=Math.floor(Date.now()/86400000)*31+(lessonCount||0)*7+(childId?childId.charCodeAt(0):0);
    return {type:'book', book:rb[seed%rb.length]};
  }
  var types=ENGLISH_LESSON_TYPES[ks]||ENGLISH_LESSON_TYPES.KS2;
  var seed2=Math.floor(Date.now()/86400000)*17+(lessonCount||0)*11+(childId?childId.charCodeAt(0)+childId.charCodeAt(childId.length-1):0);
  return {type:'topic', topic:types[seed2%types.length]};
}

  html+='<span style="font-size:10px;color:var(--t2)">'+S.xp+' XP'+(next?' / '+next.min:'')+' </span>';
  html+='</div><div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:'+pct+'%"></div></div></div>';
  html+='<div style="display:flex">';
  for(var i=0;i<defs.length;i++){
    var d=defs[i];
    html+='<button class="nitem '+(S.page===d.id?'on':'')+'" onclick=\"navTo(this.getAttribute(\x27data-p\x27))\" data-p="'+d.id+'">';
    html+='<svg viewBox="0 0 24 24" fill="none">'+d.p+'</svg>'+d.lbl+'</button>';
  }
  html+='</div></div>';
  return html;
}

/* ── DASHBOARD ──────────────────────────────────────────────────────────────── */
function buildDash(){
  var c=S.activeChild, ks=KS_MAP[c.age], tl=S.todayLessons;
  var done=0,sc=0,mx=0;
  SUBJECTS.forEach(function(s){['L1','L2'].forEach(function(p){var e=tl[s.id+'_'+p];if(e&&e.marking){done++;sc+=parseInt(e.marking.score||0);mx+=parseInt(e.marking.max_score||1);}});});
  var avg=mx>0?Math.round(sc/mx*100):0;

  // Merge today's completed lessons into history dates and totals
  var dates={};
  S.history.forEach(function(h){dates[h.lesson.lesson_date]=true;});
  // Add today's if any completed (may not be in S.history yet)
  if(done>0) dates[today()]=true;

  // Total all-time lessons = history + any today not yet in history
  var todayIds={};
  Object.values(tl).forEach(function(e){if(e&&e.marking&&e.lesson&&e.lesson.id)todayIds[e.lesson.id]=true;});
  var histIds={};
  S.history.forEach(function(h){if(h.lesson&&h.lesson.id)histIds[h.lesson.id]=true;});
  var todayNotInHist=Object.keys(todayIds).filter(function(id){return !histIds[id];}).length;
  var totalLessons=S.history.length+todayNotInHist;

  var streakH='<div class="streak-bar">';
  var act7=0;
  for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);var dk=d.toISOString().slice(0,10);var on=!!dates[dk];if(on)act7++;streakH+='<div class="sdot'+(on?' on':'')+'"></div>';}
  streakH+='<span class="streak-lbl">'+act7+' of last 7 days</span></div>';

  var cards=SUBJECTS.map(function(s){
    var l1=tl[s.id+'_L1'],l2=tl[s.id+'_L2'];
    var d1=!!(l1&&l1.marking),d2=!!(l2&&l2.marking);
    var prg=d1&&d2?'Both lessons complete \u2713':d1?'L1 done \u2014 ready for L2':'Start today\'s lesson';
    return '<div class="subj-card '+s.id+'" onclick=\"openSubject(this.getAttribute(\x27data-s\x27))\" data-s="'+s.id+'">'+
      (d1&&d2?'<div class="done-check">\u2713</div>':'')+
      '<span class="s-ico">'+s.icon+'</span>'+
      '<div class="s-name">'+s.label+'</div>'+
      '<div class="s-prg">'+prg+'</div>'+
    '</div>';
  }).join('');

  var hr=new Date().getHours();
  var greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';

  var rank=getRank(S.xp),next2=getNextRank(S.xp);
  var xpPct=next2?Math.round((S.xp-rank.min)/(next2.min-rank.min)*100):100;
  var praise=done>0?coachPraise(sc,mx):null;
  var coachH=praise?'<div class="coach-bubble"><div class="cb-name">'+esc(praise.name)+'</div>'+esc(praise.msg)+'</div>':'';
  var xpH='<div class="xp-card">'+
    '<div class="xp-top"><span class="xp-name">'+AVATARS[S.avatar]+' '+esc(c.name)+'</span><span class="xp-pts">'+S.xp+' XP</span></div>'+
    '<div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:'+xpPct+'%"></div></div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">'+
    '<span class="rank-badge" style="background:'+rank.bg+';color:'+rank.color+'">'+rank.name+'</span>'+
    (next2?'<span class="xp-next">'+(next2.min-S.xp)+' XP to '+next2.name+'</span>':'<span style="font-size:11px;color:var(--g);font-weight:700">MAX RANK</span>')+
    '</div></div>';
  var flameIco=S.streak>=3?'\ud83d\udd25':S.streak>=1?'\u2728':'\ud83d\udca4';
  var streakHero='<div class="streak-hero"><div class="streak-flame">'+flameIco+'</div>'+
    '<div class="streak-info"><div class="s-num">'+S.streak+'</div><div class="s-lbl">day streak</div></div>'+
    '<div style="display:flex;gap:5px;margin-left:auto">'+streakH.replace('<div class="streak-bar">','').replace(/\/div>$/,'').replace(/<span[^>]*>.*?<\/span>/g,'')+'</div></div>';
  return '<div class="dash-greeting"><h2>'+greet+', '+esc(c.name)+'! \ud83d\udc4b</h2>'+
    '<p>'+new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+' \u00b7 '+KS_YEAR[ks]+' \u00b7 '+ks+'</p></div>'+
    xpH+streakHero+coachH+
    (S.history.length===0&&done===0?'<div style="background:var(--gl);border:1px solid var(--gm);border-radius:var(--r12);padding:.85rem 1rem;margin-bottom:1rem;display:flex;gap:10px;align-items:center">'+
      '<div style="font-size:18px">\U0001F4DA</div>'+
      '<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--gd)">Personalise English lessons</div>'+
      '<div style="font-size:12px;color:var(--gd);margin-top:2px">Go to <strong>Settings</strong> to mark the books '+esc(c.name)+' has read. English lessons will be based on those books.</div></div>'+
      '<button class="btn btn-sm" style="background:var(--g);color:#fff;border:none;flex-shrink:0" onclick="navTo(this.getAttribute(\x27data-p\x27))" data-p="settings">Settings \u2192</button>'+
    '</div>':'')+
    '<div class="stats-grid">'+
    '<div class="stat-tile"><div class="n">'+done+'</div><div class="l">Today</div></div>'+
    '<div class="stat-tile"><div class="n">'+(mx>0?avg+'%':'\u2014')+'</div><div class="l">Avg score</div></div>'+
    '<div class="stat-tile"><div class="n">'+totalLessons+'</div><div class="l">All lessons</div></div>'+
    '<div class="stat-tile"><div class="n">'+Object.keys(dates).length+'</div><div class="l">Days active</div></div>'+
    '</div>'+
    '<div class="subj-label">Today\'s subjects</div>'+
    '<div class="subj-grid">'+cards+'</div>';
}

/* ── LESSON ─────────────────────────────────────────────────────────────────── */
function buildLesson(){
  var subj=SUBJECTS.find(function(x){return x.id===S.subject;});
  var c=S.activeChild, ks=KS_MAP[c.age];
  var l1done=!!(S.todayLessons[S.subject+'_L1']&&S.todayLessons[S.subject+'_L1'].marking);
  var entry=S.todayLessons[S.subject+'_'+S.part]||{};

  var ptabs=['L1','L2'].map(function(p,i){
    var pd=!!(S.todayLessons[S.subject+'_'+p]&&S.todayLessons[S.subject+'_'+p].marking);
    var dis=(p==='L2'&&!l1done)?'disabled':'';
    return '<button class="ppill '+(S.part===p?'on':'')+(pd?' done':'')+'" '+dis+' onclick=\"setPart(this.getAttribute(\x27data-p\x27))\" data-p="'+p+'">'+(pd?'\u2713 ':'')+
      'Lesson '+(i+1)+(p==='L2'&&!l1done?' (finish L1 first)':'')+'</button>';
  }).join('');

  var body;
  if(entry.marking)     body=buildMarked(entry);
  else if(entry.lesson) body=buildActive(entry.lesson);
  else { body='<div class="lcard"><div class="spin-state"><div class="spin"></div>Generating your '+subj.label+' lesson\u2026</div></div>'; setTimeout(generateLesson,80); }

  return '<div class="lesson-nav"><button class="back-btn" onclick=\"navTo(\x27dashboard\x27)\">\u2190 Back</button>'+
    '<div class="lesson-meta"><h2>'+subj.icon+' '+subj.label+'</h2><p>'+ks+' \u00b7 Age '+c.age+'</p></div></div>'+
    '<div class="part-pills">'+ptabs+'</div><div id="lbody">'+body+'</div>';
}

function buildActive(lesson){
  var qs=parseQs(lesson.questions).map(function(q,i){
    return '<div class="q-item"><label>Q'+(i+1)+'. '+esc(q)+'</label>'+
      '<textarea id="ans_'+i+'" oninput="saveDraft('+i+',this.value)">'+esc(getDraft(i))+'</textarea></div>';
  }).join('');
  return '<div class="lcard"><h3>'+esc(lesson.title)+'</h3>'+
    '<div class="lbody">'+esc(lesson.content)+'</div>'+
    '<a class="yt-banner" href="'+ytUrl(lesson.youtube_query||lesson.title)+'" target="_blank" rel="noopener">'+
      '<div class="yt-logo">'+YT_SVG+'</div>'+
      '<div class="yt-info"><div class="yt-hint">Watch on YouTube</div><div class="yt-q">'+esc(lesson.youtube_query||lesson.title)+'</div></div>'+
    '</a>'+
    (qs?'<div class="q-list">'+qs+'</div>':'')+
    '<div class="submit-row"><button class="btn btn-submit" onclick="submitLesson()">Submit for marking \u2192</button></div>'+
  '</div>';
}

function buildMarked(entry){
  var l=entry.lesson, m=entry.marking;
  var _ra=(entry.submission&&entry.submission.answers)||{};
  var a=typeof _ra==='string'?JSON.parse(_ra||'{}'):_ra;
  var pct=Math.round(parseInt(m.score||0)/Math.max(parseInt(m.max_score||1),1)*100);
  // Parse per-question feedback — stored as JSON in feedback column
  var qFeedback=[], overall='';
  try{
    var fb=m.feedback||'';
    if(fb.trim()[0]==='{'){
      var fp=JSON.parse(fb);
      if(fp.question_feedback) qFeedback=fp.question_feedback;
      if(fp.overall) overall=fp.overall;
    } else { overall=fb; }
  }catch(e){ overall=m.feedback||''; }
  if(m.question_feedback) try{qFeedback=typeof m.question_feedback==='string'?JSON.parse(m.question_feedback):m.question_feedback;}catch(e){}
  if(m.overall) overall=m.overall;
  var qs=parseQs(l.questions).map(function(q,i){
    var qf=qFeedback[i]||null;
    var mk=qf?qf.mark:null;
    var comment=qf?qf.comment:'';
    var markBadge=mk!==null?'<span class="q-mark '+(mk>=1?'q-mark-yes':'q-mark-no')+'">'+(mk>=1?'\u2713 1 mark':'\u2715 0 marks')+'</span>':'';
    var answerTxt=a[i]?esc(a[i]):'<em style="color:var(--t2)">(no answer given)</em>';
    return '<div class="q-item marked">'+
      '<div class="q-row"><span class="q-num">Q'+(i+1)+'</span><label>'+esc(q)+'</label>'+markBadge+'</div>'+
      '<div class="ans-box"><span class="ans-label">Your answer</span>'+answerTxt+'</div>'+
      (comment?'<div class="q-comment"><span class="comment-label">\ud83d\udcac Feedback</span>'+esc(comment)+'</div>':'')+
    '</div>';
  }).join('');
  return '<div class="done-banner">\u2713 Lesson complete! <span class="score-badge '+scCls(pct)+'">'+m.score+'/'+m.max_score+' \u00b7 '+pct+'%</span></div>'+
  '<div class="lcard"><h3>'+esc(l.title)+'</h3><div class="lbody">'+esc(l.content)+'</div>'+
  '<a class="yt-banner" href="'+ytUrl(l.youtube_query||l.title)+'" target="_blank" rel="noopener">'+
    '<div class="yt-logo">'+YT_SVG+'</div>'+
    '<div class="yt-info"><div class="yt-hint">Watch on YouTube</div><div class="yt-q">'+esc(l.youtube_query||l.title)+'</div></div>'+
  '</a>'+(qs?'<div class="q-list">'+qs+'</div>':'')+
  '</div>'+
  (overall?'<div class="lcard">'+
    '<div class="fb-head">\ud83d\udcdd Teacher\'s overall comment</div>'+
    '<div class="fb-overall">'+overall.replace(/([.!?])\s+/g,'$1\n').split('\n').filter(function(s){return s.trim();}).map(function(s){return '<p style="margin:0 0 8px 0">'+esc(s)+'</p>';}).join('')+'</div>'+
  '</div>':'');
}

      '<span class="b-ico">'+b.ico+'</span>'+'<div class="b-name">'+esc(b.name)+'</div>'+(has?'<div class="b-check">\u2713 Earned</div>':'')+
    '</div>';
  });

  h+='<div style="background:var(--s0);border:1px solid var(--b0);border-radius:var(--r16);overflow:hidden;box-shadow:var(--shadow-sm)">';

function buildLvlModal(data){

    '<div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap">'+
    data.badges.map(function(b){return '<div style="text-align:center;animation:badge-in .4s ease-out both"><div style="font-size:28px">'+b.ico+'</div><div style="font-size:11px;font-weight:600;color:var(--t1);margin-top:3px">'+esc(b.name)+'</div></div>';}).join('')+
    '</div></div>';}

    bh+'<button class="btn btn-green" onclick="closeLvlModal()">Keep learning!</button></div></div>';

/* ── HISTORY ────────────────────────────────────────────────────────────────── */
function buildHistory(){
  if(!S.history.length) return '<div class="empty-state"><div class="e-ico">\ud83d\udcda</div><h3>No lessons completed yet</h3><p>Complete your first lesson to see your progress here.</p></div>';
  var byDate={};
  S.history.forEach(function(h){var d=h.lesson.lesson_date;if(!byDate[d])byDate[d]=[];byDate[d].push(h);});
  var h='<div class="page-title">Progress History</div>';
  Object.keys(byDate).sort().reverse().forEach(function(d){
    h+='<div class="hist-group"><div class="hist-label">'+(d===today()?'Today':fmtDate(d))+'</div><ul class="hist-list">';
    byDate[d].forEach(function(en){
      var l=en.lesson,m=en.marking,sub=SUBJECTS.find(function(s){return s.id===l.subject;});
      var pct=m.max_score>0?Math.round(m.score/m.max_score*100):0;
      h+='<li class="hist-item" onclick="reviewLesson(\x27+l.subject+\x27,\x27+l.part+\x27)">'+
        '<div class="hi-dot" style="background:'+subClr(l.subject)+'"></div>'+
        '<div class="hi-info"><div class="hi-title">'+(sub?sub.icon+' '+sub.label:l.subject)+' \u2014 '+l.part+'</div>'+
        '<div class="hi-meta">'+esc(l.title)+'</div></div>'+
        '<span class="score-badge '+scCls(pct)+'">'+m.score+'/'+m.max_score+'</span></li>';
    });
    h+='</ul></div>';
  });
  return h;
}

function toggleLesson(id){
  var b=document.getElementById('ltb_'+id);
  var c=document.getElementById('ltc_'+id);
  if(!b)return;

}

async function loadParentData(){

function renderParentContent(c,lessons,bySubj){
  var h='';
  var totalLessons=lessons.length;
  var totalScore=lessons.reduce(function(a,l){return a+parseInt(l.score||0);},0);
  var totalMax=lessons.reduce(function(a,l){return a+parseInt(l.max_score||1);},0);
  var overallPct=totalMax>0?Math.round(totalScore/totalMax*100):0;
  var rank=getRank(S.xp);
  var dates={};
  lessons.forEach(function(l){dates[l.lesson_date]=true;});
  var daysActive=Object.keys(dates).length;

  // ── HEADER ────────────────────────────────────────────────────────────────
  var overallGrade=overallPct>=80?'Strong':overallPct>=65?'Good':overallPct>=50?'Developing':'Needs support';
  var gradeCol=overallPct>=80?'var(--g)':overallPct>=65?'#378ADD':overallPct>=50?'var(--am)':'var(--rd)';
  h+='<div class="parent-header">';
  h+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px">';
  h+='<div><h2 style="margin-bottom:2px">'+esc(c.name)+'</h2>';
  h+='<p>'+KS_MAP[c.age]+' \u00b7 Year '+(c.age-4)+' \u00b7 Age '+c.age+' \u00b7 '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'</p></div>';
  h+='<div style="text-align:right;flex-shrink:0"><div style="font-size:22px;font-weight:700;color:'+gradeCol+'">'+overallGrade+'</div>';
  h+='<div style="font-size:11px;color:var(--t2)">Overall</div></div></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">';
  var stats=[
    {n:totalLessons,l:'Lessons done'},
    {n:overallPct+'%',l:'Overall avg'},
    {n:S.streak,l:'Day streak'},
    {n:daysActive,l:'Days active'}
  ];
  stats.forEach(function(s){
    h+='<div style="text-align:center;background:var(--s1);border-radius:var(--r8);padding:8px 4px">'+
      '<div style="font-size:20px;font-weight:700;letter-spacing:-.5px">'+s.n+'</div>'+
      '<div style="font-size:10px;color:var(--t2);margin-top:2px">'+s.l+'</div></div>';
  });
  h+='</div></div>';

  // ── SUBJECT PERFORMANCE ───────────────────────────────────────────────────
  h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:8px">Performance by subject</div>';
  h+='<div class="subj-perf-grid">';
  var subjectOrder=['maths','english','science','history','geography'];
  subjectOrder.forEach(function(subj){
    var d=bySubj[subj];
    if(!d)return;
    var pct=parseInt(d.avg_pct||0);
    var last=parseInt(d.last_pct||0);
    var prev=parseInt(d.prev_pct||0);
    var trend=prev>0?(last>prev+3?'\u2191 Improving':last<prev-3?'\u2193 Declining':'\u2192 Stable'):'';
    var trendCls=last>prev+3?'trend-up':last<prev-3?'trend-dn':'trend-eq';
    var col=SUBJ_COLORS[subj]||'var(--g)';
    var barPct=Math.min(100,pct);
    h+='<div class="subj-perf">'+
      '<div class="sp-name">'+(SUBJ_ICONS[subj]||'')+' '+subj+'</div>'+
      '<div class="sp-pct" style="color:'+col+'">'+pct+'%</div>'+
      '<div class="sp-detail">'+d.count+' lesson'+(d.count!==1?'s':'')+' \u00b7 '+d.total_score+'/'+d.total_max+'</div>'+
      (trend?'<div class="sp-trend '+trendCls+'">'+trend+'</div>':'')+
      '<div class="perf-bar"><div class="perf-bar-fill" style="width:'+barPct+'%;background:'+col+'"></div></div>'+
    '</div>';
  });
  h+='</div>';

  // ── STRENGTHS & AREAS TO IMPROVE ─────────────────────────────────────────
  // Mine feedback text for specific issues and strengths
  var issueKeywords=[
    {pat:/spelling/i, label:'Spelling accuracy'},
    {pat:/check your (subtraction|addition|multiplication|division|arithmetic|calculation|working)|arithmetic error|maths error|calculation is (wrong|incorrect)/i, label:'Arithmetic accuracy'},
    {pat:/show (your |the )?working/i, label:'Showing working', subjects:['maths','science']},
    {pat:/more detail|expand your|develop your|too brief|not enough detail/i, label:'Developing detailed answers'},
    {pat:/punctuation/i, label:'Punctuation', subjects:['english']},
    {pat:/grammar/i, label:'Grammar', subjects:['english']},
    {pat:/vocabulary|technical term|scientific term|key term/i, label:'Subject vocabulary'},
    {pat:/re-?read|answer all parts|missed part|did not fully answer/i, label:'Reading questions fully'},
    {pat:/explain (more|further|why|how|your reasoning)/i, label:'Explaining reasoning'},
    {pat:/structure your|paragraph structure/i, label:'Answer structure', subjects:['english']},
    {pat:/evidence|quote|reference the (text|source)/i, label:'Using evidence', subjects:['english','history']},
    {pat:/check (your answers|before submitting|your work)/i, label:'Checking work carefully'}
  ];
  var strengthKeywords=[
    {pat:/excellent|outstanding|perfect|full marks|100%|very strong/i, label:'Excellent performance'},
    {pat:/good understanding|solid understanding|strong understanding|grasp/i, label:'Strong topic understanding'},
    {pat:/creative|thoughtful|original/i, label:'Creative thinking'},
    {pat:/correct(ly)?.*method|right method|approach is (correct|right|excellent)/i, label:'Correct method'},
    {pat:/confidence|growing|improving|progress/i, label:'Showing clear progress'}
  ];
  var issueMap={}, strengthMap={};
  lessons.forEach(function(l){
    var fb=l.feedback||'';
    try{ var fp=JSON.parse(fb); fb=(fp.overall||'')+' '+(fp.question_feedback||[]).map(function(q){return q.comment||'';}).join(' '); }catch(e){}
    issueKeywords.forEach(function(k){
      if(k.subjects&&k.subjects.indexOf(l.subject)===-1) return; // subject filter
      if(k.pat.test(fb)){
        var key=l.subject.charAt(0).toUpperCase()+l.subject.slice(1)+': '+k.label;
        issueMap[key]=(issueMap[key]||0)+1;
      }
    });
    strengthKeywords.forEach(function(k){
      if(k.pat.test(fb)){
        var key=l.subject.charAt(0).toUpperCase()+l.subject.slice(1)+': '+k.label;
        strengthMap[key]=(strengthMap[key]||0)+1;
      }
    });
  });
  // Sort by frequency, take top items
  var topIssues=Object.keys(issueMap).sort(function(a,b){return issueMap[b]-issueMap[a];}).slice(0,6);
  var topStrengths=Object.keys(strengthMap).sort(function(a,b){return strengthMap[b]-strengthMap[a];}).slice(0,6);
  // Also add high-scoring subjects as strengths
  subjectOrder.forEach(function(subj){
    var d=bySubj[subj]; if(!d)return;
    var pct=parseInt(d.avg_pct||0);
    if(pct>=80&&d.count>=2){
      var k=subj.charAt(0).toUpperCase()+subj.slice(1)+': Consistently high scores ('+pct+'% avg)';
      if(topStrengths.indexOf(k)===-1) topStrengths.unshift(k);
    }
  });
  topStrengths=topStrengths.slice(0,5);
  if(topStrengths.length||topIssues.length){
    h+='<div class="strengths-grid">';
    if(topStrengths.length){
      h+='<div class="strength-card str-good"><h4 style="color:var(--g)">\u2713 Strengths</h4><ul>';
      topStrengths.forEach(function(s){h+='<li>'+esc(s)+'</li>';});
      h+='</ul></div>';
    }
    if(topIssues.length){
      h+='<div class="strength-card str-improve"><h4 style="color:var(--am)">\u2197 Focus areas</h4><ul>';
      topIssues.forEach(function(s){h+='<li>'+esc(s)+'</li>';});
      h+='</ul></div>';
    }
    h+='</div>';
  }

  // ── LESSON TIMELINE ───────────────────────────────────────────────────────
  h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2);margin-bottom:8px">Lesson history</div>';

  // Group by date
  var byDate={};
  lessons.forEach(function(l){
    if(!byDate[l.lesson_date])byDate[l.lesson_date]=[];
    byDate[l.lesson_date].push(l);
  });
  var dates2=Object.keys(byDate).sort().reverse();

  dates2.forEach(function(date){
    var dayLessons=byDate[date];
    var dayScore=dayLessons.reduce(function(a,l){return a+parseInt(l.score||0);},0);
    var dayMax=dayLessons.reduce(function(a,l){return a+parseInt(l.max_score||1);},0);
    var dayPct=dayMax>0?Math.round(dayScore/dayMax*100):0;
    var dateStr=new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});

    h+='<div style="margin-bottom:12px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
      '<div style="font-size:12px;font-weight:700;color:var(--t1)">'+dateStr+'</div>'+
      '<div style="font-size:11px;color:var(--t2)">'+dayLessons.length+' lessons \u00b7 '+dayPct+'% avg</div>'+
    '</div>';
    h+='<div class="lesson-timeline">';

    dayLessons.forEach(function(l){
      var pct=parseInt(l.pct||0);
      var col=SUBJ_COLORS[l.subject]||'var(--g)';
      var scoreCls=pct>=80?'var(--g)':pct>=60?'var(--am)':'var(--rd)';
      var uid=l.id.replace(/-/g,'').slice(0,8);

      // Parse and render feedback for parent view
      var feedbackHtml='';
      try{
        var fb=l.feedback||'';
        var fp=null;
        if(fb.trim()[0]==='{'){ try{fp=JSON.parse(fb);}catch(pe){} }
        var qFb=fp&&fp.question_feedback?fp.question_feedback:[];
        var overall=fp&&fp.overall?fp.overall:(!fp?fb:'');

        // Parent summary — honest, direct, written for parents not child
        if(overall){
          // Split into sentences and format as paragraphs for readability
          var sentences=overall.replace(/([.!?])\s+/g,'$1\n').split('\n').filter(function(s){return s.trim();});
          var paras=[];
          for(var si=0;si<sentences.length;si+=2){
            paras.push(sentences.slice(si,si+2).join(' '));
          }
          var formattedOverall=paras.map(function(p){return '<p style="margin:0 0 8px 0">'+esc(p)+'</p>';}).join('');
          feedbackHtml+=
            '<div style="margin-bottom:12px">'+
            '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);margin-bottom:5px">Parent summary</div>'+
            '<div style="font-size:13px;color:var(--t0);line-height:1.6;background:var(--s1);border-radius:var(--r8);padding:10px 12px;border-left:3px solid var(--am)">'+formattedOverall+'</div>'+
            '</div>';
        }

        // Per-question breakdown — clear correct/incorrect with reasoning
        if(qFb.length){
          var correct=qFb.filter(function(q){return q.mark>=1;}).length;
          feedbackHtml+=
            '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);margin-bottom:6px">'+
            'Question breakdown \u00b7 '+correct+'/'+qFb.length+' correct'+
            '</div>';
          feedbackHtml+='<div style="display:flex;flex-direction:column;gap:6px">';
          qFb.forEach(function(qf){
            var correct2=qf.mark>=1;
            var bc=correct2?'#e1f5ee':'#fce8e8';
            var tc=correct2?'#0f6e56':'#b91c1c';
            var ic=correct2?'#16a974':'var(--rd)';
            feedbackHtml+=
              '<div style="background:var(--s0);border:1px solid var(--b0);border-radius:var(--r8);padding:8px 10px;border-left:3px solid '+ic+'">'+
              '<div style="display:flex;align-items:center;gap:8px;margin-bottom:'+(qf.comment?'5':'0')+'px">'+
              '<span style="font-size:11px;font-weight:700;color:var(--t2)">Q'+qf.q+'</span>'+
              '<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--rpill);background:'+bc+';color:'+tc+'">'+(correct2?'\u2713 Correct':'\u2715 Incorrect')+'</span>'+
              '</div>'+
              (qf.comment?'<div style="font-size:12px;color:var(--t1);line-height:1.5">'+esc(qf.comment)+'</div>':'')+
              '</div>';
          });
          feedbackHtml+='</div>';
        } else if(!overall){
          feedbackHtml='<div style="font-size:13px;color:var(--t2);font-style:italic">No detailed feedback available for this lesson.</div>';
        }
      }catch(e){ feedbackHtml='<div style="font-size:13px;color:var(--t1)">'+esc(l.feedback||'')+'</div>'; }

      h+='<div class="lt-item">'+
        '<div class="lt-head" onclick="toggleLesson(this.dataset.uid)" data-uid="'+uid+'">'+
          '<div class="lt-subj-dot" style="background:'+col+'"></div>'+
          '<div class="lt-info">'+
            '<div class="lt-title">'+esc(l.title)+'</div>'+
            '<div class="lt-meta">'+l.subject.charAt(0).toUpperCase()+l.subject.slice(1)+' \u00b7 '+l.part+'</div>'+
          '</div>'+
          '<div class="lt-score" style="color:'+scoreCls+'">'+l.score+'/'+l.max_score+'<small>'+pct+'%</small></div>'+
          '<div class="lt-chevron" id="ltc_'+uid+'">\u25bc</div>'+
        '</div>'+
        '<div class="lt-body" id="ltb_'+uid+'">'+feedbackHtml+'</div>'+
      '</div>';
    });
    h+='</div></div>';
  });

  if(!lessons.length){
    h+='<div style="text-align:center;padding:2rem;color:var(--t2)">No completed lessons yet. Lessons will appear here once marked.</div>';
  }

  return h;
}

async function loadChildren(){
  var rows=await apiChildren(S.user.id,S.token);
  S.children=rows||[];
  if(S.children.length>0){
    S.activeChild=S.children[0];
    loadGameState();
    await Promise.all([loadTodayLessons(),loadHistory()]);
  }
}

async function loadTodayLessons(){
  if(!S.activeChild)return;
  S.todayLessons={};
  var ls=await apiLessons(S.activeChild.id,today(),S.token);
  if(!ls||!ls.length)return;
  for(var i=0;i<ls.length;i++){
    var l=ls[i];
    if(!l||!l.content||l.title==='Generation failed')continue;
    var key=l.subject+'_'+l.part;
    var entry={lesson:l};
    // get_lessons now returns submission+marking joined
    if(l.submission&&l.submission.id) entry.submission=l.submission;
    if(l.marking&&l.marking.id) entry.marking=l.marking;
    // fallback to separate calls if not joined
    if(!entry.submission){
      var sub=await apiGetSub(l.id,S.token);
      if(sub){ entry.submission=sub; var mk2=await apiGetMark(l.id,S.token); if(mk2)entry.marking=mk2; }
    }
    S.todayLessons[key]=entry;
  }
}

async function loadHistory(){
  if(!S.activeChild)return;
  var ls=await (DB_MODE==='live'
    ? rpc('get_all_lessons',{p_child_id:S.activeChild.id}).catch(function(e){sbLog('loadHistory',e);return LDB.lessons(S.activeChild.id,null);})
    : Promise.resolve(LDB.lessons(S.activeChild.id,null)));
  if(!ls||!Array.isArray(ls)) ls=[];
  var hist=[];
  for(var i=0;i<ls.length;i++){
    var l=ls[i];
    if(!l||!l.id)continue;
    // get_all_lessons now returns marking joined directly — no extra API call needed
    var mk=(l.marking&&l.marking.id) ? l.marking : await apiGetMark(l.id,S.token);
    if(mk){
      var entry={lesson:l,marking:mk};
      if(l.submission&&l.submission.id) entry.submission=l.submission;
      hist.push(entry);
    }
  }
  S.history=hist;
}

async function addFirstChild(){
  var name=(val('ob-nm')||S.obName).trim(), age=S.obAge;
  if(!name||!age){alert('Please enter a name and select an age.');return;}
  if(!S.user||!S.user.id){alert('Session error — please sign in again.');return;}
  try{
    console.log('[addFirstChild] S.user:', JSON.stringify(S.user), 'name:', name, 'age:', age);
    var r=await apiAddChild({user_id:S.user.id,name:name,age:age,key_stage:KS_MAP[age]},S.token);
    console.log('[addFirstChild] apiAddChild result:', JSON.stringify(r));
    if(!r||!r.id){throw new Error('Child not saved — please try again.');}
    S.children.push(r); S.activeChild=r; S.obName=''; S.obAge=null;
    loadGameState();
    await Promise.all([loadTodayLessons(),loadHistory()]);
    S.page='dashboard'; render();
  }catch(e){
    console.error('addFirstChild:',e);
    alert('Could not save child profile: '+(e.message||e));
  }
}

async function addChild(){
  var name=((val('new-nm')||S.newChildName)||'').trim(), age=S.newChildAge;
  if(!name||!age){alert('Please enter a name and select an age.');return;}
  var r=await apiAddChild({user_id:S.user.id,name:name,age:age,key_stage:KS_MAP[age]},S.token);
  S.children.push(r); S.newChildName=''; S.newChildAge=null; render();
}

async function switchChild(id){
  S.activeChild=S.children.find(function(c){return c.id===id;});
  S.todayLessons={}; S.history=[]; S.showModal=false; S.page='dashboard';
  loadGameState();
  var fc=await apiChildren(S.user.id,S.token);
  if(fc&&fc.length){S.children=fc;S.activeChild=fc.find(function(c){return c.id===S.activeChild.id;})||fc[0];}
  await Promise.all([loadTodayLessons(),loadHistory()]); render();
}

/* ── LESSON GENERATION ──────────────────────────────────────────────────────── */
async function generateLesson(){
  var c=S.activeChild, ks=KS_MAP[c.age], key=S.subject+'_'+S.part;
  var pn=S.part==='L1'?1:2, isEng=S.subject==='english';
  var _engCount=S.history.filter(function(h){return h.lesson.subject==='english';}).length;

  // Set active child read books for pickEnglishType
  window._activeChildReadBooks=S.activeChild&&S.activeChild.read_books?
    (typeof S.activeChild.read_books==='string'?JSON.parse(S.activeChild.read_books||'[]'):S.activeChild.read_books):[];

  var _engType=isEng?pickEnglishType(ks,c.id,_engCount):null;
  var isBookLesson=isEng&&_engType&&_engType.type==='book';
  var engTopic=isEng&&_engType&&_engType.type==='topic'?_engType.topic:'';
  var book=isBookLesson?_engType.book:(isEng?pickBook(ks,c.id,_engCount):'');

  var safeBook=isBookLesson?book.replace(/'/g,'').replace(/"/g,''):'';

  // Build recent topic history to avoid repetition
  var recentTopics=S.history
    .filter(function(h){return h.lesson.subject===S.subject;})
    .slice(-6)
    .map(function(h){return h.lesson.title;})
    .join(', ');

  // Question counts by subject (~25 mins each)
  var qCount={maths:10,english:4,science:6,history:5,geography:5}[S.subject]||5;

  // UK National Curriculum topic guidance by subject and key stage
  var topicGuide={
    maths:{
      KS1:'number bonds, counting, simple addition and subtraction, place value to 100, halves and quarters, simple shapes and measurements, telling the time',
      KS2:'multiplication and division, fractions decimals and percentages, place value to millions, negative numbers, ratio and proportion, algebra basics, area and perimeter, volume, statistics, angles and geometry',
      KS3:'algebra and linear equations, proportional reasoning, Pythagoras theorem, probability, statistics, sequences, transformations, construction and loci, indices',
      KS4:'quadratic equations, simultaneous equations, trigonometry, vectors, circle theorems, statistical distributions, proof, surds and bounds'
    },
    science:{
      KS1:'plants and their needs, animals and humans, everyday materials, seasonal changes',
      KS2:'living things and habitats, food chains, human body and nutrition, properties of materials, rocks and fossils, light and shadows, forces and magnets, electricity and circuits, Earth and space, evolution and inheritance',
      KS3:'cells and organisation, reproduction, ecosystems and interdependence, chemistry of materials, chemical reactions, acids and alkalis, energy transfers, electricity and magnetism, waves, forces and motion, space physics',
      KS4:'genetics and evolution, homeostasis, atomic structure, bonding, rates of reaction, electrolysis, energy resources, fields, electromagnetic spectrum, nuclear physics'
    },
    history:{
      KS1:'changes within living memory, lives of significant historical figures, events beyond living memory, local history',
      KS2:'Stone Age to Iron Age, Ancient Egypt, Ancient Greece, Roman Britain, Anglo-Saxons and Scots, Vikings, a significant turning point in British history such as the Norman Conquest 1066',
      KS3:'Medieval England and the Black Death, the Tudors and religious change, the English Civil War, Britain and the British Empire, the Industrial Revolution, causes and events of World War One, the rise of Nazi Germany and World War Two, the Holocaust, the Cold War and civil rights movements',
      KS4:'Weimar and Nazi Germany 1918-1945, America in the Cold War era, medicine through time, the historic environment, a period study and a thematic study'
    },
    geography:{
      KS1:'local area, the four countries of the UK and their capitals, hot and cold places, weather and seasons, basic map skills',
      KS2:'UK regions and physical features, European countries, North America, South America, biomes and climate zones, rivers and the water cycle, volcanoes and earthquakes, human and physical geography, map skills and grid references, fieldwork',
      KS3:'population growth and urbanisation, development and global inequality, climate change and its impacts, coasts and coastal processes, rivers and flooding, glaciation, tectonic hazards, global trade and economic activity, energy resources',
      KS4:'global distribution of biomes and ecosystems, urban change in UK cities, global development gap, coastal change and conflict, hazardous environments, the challenge of resource management'
    },
    english:{
      KS1:'phonics and decoding, simple sentence writing, reading for meaning, character description, retelling stories',
      KS2:'reading comprehension and inference, vocabulary in context, narrative writing, persuasive and non-fiction writing, poetry appreciation, figurative language, grammar punctuation and spelling',
      KS3:'analysis of fiction and non-fiction texts, language and structural techniques, context and themes, creative writing, argument and rhetoric, Shakespeare introduction, comparing texts',
      KS4:'literary analysis with evidence, comparing texts and writers craft, language techniques in depth, writing for different purposes and audiences, unseen poetry, spoken language study'
    }
  };
  var curriculumHint=(topicGuide[S.subject]&&topicGuide[S.subject][ks])||'';

  var prompt=
    'You are an expert UK '+ks+' teacher creating a '+S.subject+' lesson for a '+c.age+'-year-old in Year '+(c.age-4)+'.\n'+
    (isBookLesson?'BOOK FOR THIS LESSON: '+safeBook+'. The child has read this book. Focus on comprehension, vocabulary, themes, inference, or creative writing inspired by it.\n':'')+
    (engTopic?'ENGLISH TOPIC FOR THIS LESSON: '+engTopic+'. This is NOT a book lesson. Teach this topic directly with clear explanation, examples, and practice questions.\n':'')+
    (recentTopics?'TOPICS ALREADY COVERED RECENTLY - choose a DIFFERENT topic: '+recentTopics+'\n':'')+
    'CURRICULUM AREAS FOR THIS SUBJECT ('+ks+'): '+curriculumHint+'\n'+
    'LESSON '+pn+' OF 2.'+(pn===2?' This lesson MUST build directly on Lesson 1 with greater depth and challenge.':'')+' \n'+
    '\n'+
    'REQUIREMENTS:\n'+
    '- Pick one specific focused topic from the curriculum areas above that has NOT been covered recently\n'+
    '- Content must be precisely right for a '+c.age+'-year-old UK Year '+(c.age-4)+' student\n'+
    '- The lesson should take 25 minutes to complete including reading and answering\n'+
    '- Write exactly '+qCount+' questions - this subject needs '+qCount+' questions to fill 25 minutes appropriately\n'+
    '- Questions must progress: start with recall, move to application, finish with analysis or evaluation\n'+
    '- For maths: every question must include actual numbers to calculate - not just explanations\n'+
    '- For history: ALL questions must assess historical knowledge and thinking ONLY — causes, consequences, significance, chronology, change and continuity, similarity and difference, use of evidence. NEVER include arithmetic or calculations even if set in a historical context (e.g. do not ask "how many years ago was 1066" or "calculate the area of land"). Any numerical thinking must be purely about historical facts, not arithmetic.\n'+
    '- For geography: ALL questions must assess geographical knowledge and understanding ONLY — processes, patterns, human and physical geography, place knowledge, environmental issues. NEVER include arithmetic or maths problems even in a geographical context.\n'+
    '- For science: questions must test scientific understanding, reasoning and vocabulary. Avoid questions that are primarily arithmetic calculations — focus on explaining processes, making predictions, and applying scientific concepts.\n'+
    '- For english: questions must test literacy skills only — comprehension, inference, language analysis, creative writing, vocabulary, grammar. Never include maths.\n'+
    '- NEVER ask the student to draw, sketch, create a diagram, use physical resources, or go outside\n'+
    '- ALL questions must be answerable by typing text - this is a digital app\n'+
    '- Use UK English spelling and UK context (pounds not dollars, UK places, UK curriculum)\n'+
    '\n'+
    'CRITICAL JSON RULES:\n'+
    '- Respond ONLY with a single valid JSON object. No markdown fences. No text before or after the JSON.\n'+
    '- Do NOT use apostrophes or single quotes inside string values. Reword contractions (use "do not" not "don" + apostrophe + "t").\n'+
    '- Use only straight double-quotes for all JSON structure.\n'+
    '\n'+
    '{"title":"specific topic name","content":"4 paragraphs of clear engaging age-appropriate UK curriculum content","questions":["question 1","question 2"],"youtube_query":"6-8 word YouTube search for educational video on this topic"}'

  var lesson=null;
  try{
    var res=await fetch(AIURL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:prompt,max_tokens:2000})});
    var data=await res.json();
    console.log('[generateLesson] status:',res.status,'data:',JSON.stringify(data).slice(0,300));
    if(!res.ok) throw new Error('Proxy error '+res.status+': '+JSON.stringify(data).slice(0,200));
    var txt='';
    // Handle both direct Anthropic response and n8n-wrapped response
    var payload=data;
    if(data.body&&data.body.content) payload=data.body;
    if(payload.content) payload.content.forEach(function(b){if(b.text)txt+=b.text;});
    if(!txt) throw new Error('Empty response from AI');
    console.log('[generateLesson] txt:',txt.slice(0,200));
    lesson=extractJSON(txt);
    lesson.book_title=isBookLesson?safeBook:null;
  }catch(e){
    console.error('generateLesson:',e);
    lesson={title:'Generation failed',content:'Could not generate lesson. Please go back and try again.',questions:[],youtube_query:'',book_title:null};
  }

  var saved=null;
  try{
    saved=await apiAddLesson({child_id:c.id,lesson_date:today(),subject:S.subject,part:S.part,
      title:lesson.title,content:lesson.content,questions:lesson.questions,
      book_title:lesson.book_title,youtube_query:lesson.youtube_query},S.token);
  }catch(e){ saved=Object.assign({id:uid()},lesson); }

  S.todayLessons[key]={lesson:saved}; // drafts preserved
  var el=document.getElementById('lbody');
  if(el&&S.page==='lesson') el.innerHTML=buildActive(saved);
}

/* ── SUBMIT + MARK ──────────────────────────────────────────────────────────── */
async function submitLesson(){
  var key=S.subject+'_'+S.part, entry=S.todayLessons[key];
  if(!entry||!entry.lesson)return;
  var lesson=entry.lesson;

  var answers={};
  parseQs(lesson.questions).forEach(function(_,i){var el=document.getElementById('ans_'+i);answers[i]=el?el.value:getDraft(i);});

  var el=document.getElementById('lbody');
  if(el)el.innerHTML='<div class="lcard"><div class="spin-state"><div class="spin"></div>Marking your work\u2026</div></div>';

  var sub=null;
  try{ sub=await apiAddSub({lesson_id:lesson.id,answers:answers},S.token); }
  catch(e){ sub={id:uid(),lesson_id:lesson.id,answers:answers}; }

  var _qs=parseQs(lesson.questions);
  var maxSc=_qs.length; // 1 mark per question
  var qa=_qs.map(function(q,i){return 'Q'+(i+1)+': '+q+'\nAnswer: '+(answers[i]||'(no answer)');}).join('\n\n');

  var safeTitle=(lesson.title||'').replace(/'/g,'').replace(/"/g,'');
  var mPrompt=
    'You are an experienced UK '+KS_MAP[S.activeChild.age]+' teacher marking a '+S.activeChild.age+'-year-old student work in '+S.subject+'.\n'+
    'Lesson title: '+safeTitle+'\n\n'+
    qa+'\n\n'+
    'MARKING INSTRUCTIONS:\n'+
    '- Award 1 mark for a correct, sufficiently detailed answer. Award 0 for incorrect or too vague.\n'+
    '- For EACH question write a separate 1-2 sentence comment: acknowledge what was right, then clearly state what was wrong or missing.\n'+
    '- Be specific and honest - do not soften errors. If the answer is wrong, say it is wrong and explain why.\n'+
    '- The per-question comments are shown to the CHILD so use warm, encouraging, direct teacher language addressing the child as "you".\n'+
    '- The overall summary is READ BY PARENTS ONLY, not the child. Write it as a teacher reporting to a parent: use "Rory" or "your child", not "you". Be frank, specific and honest. Do not soften poor performance. Parents need to know exactly what their child did well, what they got wrong, and what they need to practise. Write 3-4 sentences.\n'+
    '- Do NOT use apostrophes or single quotes inside any JSON string value. Reword contractions.\n'+
    '- Respond ONLY with a valid JSON object. No markdown fences. No text outside the JSON.\n'+
    '{"score":integer,"max_score":'+maxSc+',"question_feedback":[{"q":1,"mark":0or1,"comment":"teacher comment on Q1"},{"q":2,"mark":0or1,"comment":"teacher comment on Q2"}],"overall":"2-3 sentence honest parent-facing summary of performance, strengths and next steps"}';

  var mark=null;
  try{
    var res=await fetch(AIURL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:mPrompt,max_tokens:800})});
    var data=await res.json();
    console.log('[submitLesson] status:',res.status,'data:',JSON.stringify(data).slice(0,200));
    if(!res.ok) throw new Error('Proxy error '+res.status);
    var txt='';
    var payload=data;
    if(data.body&&data.body.content) payload=data.body;
    if(payload.content) payload.content.forEach(function(b){if(b.text)txt+=b.text;});
    mark=extractJSON(txt);
  }catch(e){
    console.error('mark:',e);
    var el2=document.getElementById('lbody');
    if(el2)el2.innerHTML='<div class="lcard"><div class="retry-card"><p>Marking failed \u2014 please try again.</p><button class="btn btn-ghost" onclick="submitLesson()">Retry</button></div></div>';
    return;
  }

  var savedMk=null;
  try{ savedMk=await apiAddMark({submission_id:sub.id,lesson_id:lesson.id,score:mark.score,max_score:mark.max_score,feedback:mark.feedback,question_feedback:mark.question_feedback,overall:mark.overall},S.token); }
  catch(e){ savedMk=Object.assign({id:uid()},mark); }

  S.todayLessons[key].submission=sub;
  S.todayLessons[key].marking=savedMk;
  // Clear only this lesson's drafts
  var dk=S.subject+'_'+S.part+'_';
  Object.keys(S.drafts).forEach(function(k){if(k.slice(0,dk.length)===dk)delete S.drafts[k];});
  updateStreak();
  var isFirst=Object.values(S.todayLessons).filter(function(e){return e&&e.marking;}).length<=1;
  var xpAmt=xpForLesson(mark.score,mark.max_score,isFirst);
  var xpRes=awardXP(xpAmt);
  var newBadges=checkBadges();
  await loadHistory();
  var el3=document.getElementById('lbody');
  if(el3&&S.page==='lesson') el3.innerHTML=buildMarked(S.todayLessons[key]);
  floatXP(xpAmt,document.querySelector('.btn-submit')||el3);
  if(xpRes.leveled||newBadges.length){setTimeout(function(){showLevelUpModal(xpRes.newRank,newBadges);},900);}
}

/* ── NAV ────────────────────────────────────────────────────────────────────── */
function navTo(pg){S.page=pg;render();}
function setPart(p){S.part=p;render();}
function toggleModal(){S.showModal=!S.showModal;render();}
function openSubject(sub){
  S.subject=sub; S.page='lesson';
  var l1=!!(S.todayLessons[sub+'_L1']&&S.todayLessons[sub+'_L1'].marking);
  var l2=!!(S.todayLessons[sub+'_L2']&&S.todayLessons[sub+'_L2'].marking);
  S.part=l1&&!l2?'L2':'L1'; render();
}
function reviewLesson(subj,part){S.subject=subj;S.part=part;S.page='lesson';render();}
async function doSignOut(){
  S.user=null;S.token=null;S.children=[];S.activeChild=null;
  S.todayLessons={};S.history=[];S.page='dashboard';S.authMode='login';S.authErr='';S.authOk='';
  persist('hs_tok',''); render();
}

/* ── BOOT ───────────────────────────────────────────────────────────────────── */
(async function boot(){
  memLoad(); render();
  var tok=recall('hs_tok');
  if(!tok)return;
  if(tok.startsWith('local_')){
    var uid2=tok.slice(6);
    var found=Object.values(MEM.users).find(function(u){return u.id===uid2;});
    if(found){S.user=found;S.token=tok;await loadChildren();render();}
    return;
  }
  try{
    if(tok.startsWith('db_')){
      // DB-mode token — load user from profiles table
      var uid2=tok.slice(3);
      var pr=await fetch(SB+'/rest/v1/profiles?id=eq.'+uid2,{headers:sbH(tok)});
      if(pr.ok){var pd=await pr.json();if(pd&&pd[0]){S.user={id:pd[0].id,email:pd[0].email,user_metadata:{full_name:pd[0].full_name}};S.token=tok;DB_MODE='live';await loadChildren();render();}else persist('hs_tok','');}
      else persist('hs_tok','');
    } else {
      var r=await fetch(SB+'/auth/v1/user',{headers:sbH(tok)});
      if(r.ok){S.user=await r.json();S.token=tok;DB_MODE='live';await ensureProfile(S.user,tok);await loadChildren();render();}
      else persist('hs_tok','');
    }
  }catch(e){persist('hs_tok','');}
})();
</script>
